# Time Tracker Configuration

# Capture settings
capture:
  interval_seconds: 180
  screenshot_dir: "../data/screenshots"
  image_format: "png"
  # Resize before sending to model — full retina res is overkill and slow
  max_width: 768

# Model settings
model:
  name:  "gemma4:26b" #"qwen3.6:27b" #"qwen3.6:latest"  # Update if your ollama tag differs — check `ollama list`
  ollama_host: "http://localhost:11434"
  timeout_seconds: 600

# Distraction alerts
alerts:
  distraction_categories:
    - Doomscroll
    - Entertainment
    - Social
  threshold_minutes: 15
  snooze_minutes: 30

# Menu bar display settings
menubar:
  refresh_interval_seconds: 60
  stale_threshold_seconds: 300   # 5 min -> show Paused
  top_n_categories: 5
  max_title_chars: 32            # macOS menu bar real estate guard

# Storage
storage:
  log_csv: "../data/log.csv"
  reports_dir: "../data/reports"

# Taxonomy — 12 fixed categories
# Model MUST classify each screenshot into exactly one of these
categories:
  - id: "InterviewPrep-DSA"
    description: "Practicing data structures & algorithms problems — LeetCode, Blind 75, Educative.io DSA courses, Java/Python coding practice, problem editorials"
  - id: "InterviewPrep-ML"
    description: "Studying ML concepts for interviews — decision trees, boosting, gradient methods, ML system design, statistics for ML, model evaluation"
  - id: "InterviewPrep-SystemDesign"
    description: "Studying distributed systems / generic system design — sharding, caching, scaling, design patterns, system design videos or articles"
  - id: "JobHunt"
    description: "Actively looking for jobs — browsing/applying on LinkedIn Jobs, Instahyre, Wellfound, Cutshort; messaging recruiters; tracking applications; researching companies; reading or sending job-related emails"
  - id: "Learning"
    description: "Building knowledge unrelated to interview prep — research papers, AI/tech news articles, technical blogs, documentation, educational YouTube (Karpathy, conference talks), tutorials, debugging or coding for learning"
  - id: "Communication"
    description: "Professional messaging not tied to job hunt — work email threads, Slack with colleagues, calendar/scheduling, work-related calls"
  - id: "Personal"
    description: "Personal admin and non-leisure life tasks — family finances, property/legal review, household admin, personal planning, spreadsheets for life management"
  - id: "Doomscroll"
    description: "Passive feed consumption with no clear goal — Twitter/X feed, Reddit browsing, LinkedIn feed (NOT jobs), Hacker News, news scrolling, YouTube Shorts, Instagram feed"
  - id: "Rest"
    description: "Intentional downtime with minimal screen interaction — music apps in foreground, meditation apps, screen on but user is on a break, lunch with screen idle"
  - id: "Entertainment"
    description: "Deliberately chosen leisure content — non-educational YouTube videos, Netflix/Prime/streaming, gaming, movies, deliberately watching something for enjoyment"
  - id: "Social"
    description: "Personal communication with friends/family — WhatsApp, iMessage with personal contacts, personal calls (FaceTime, WhatsApp video), social messaging not tied to work"
  - id: "Idle"
    description: "Cannot determine the activity — blank desktop, locked screen, screensaver, screen showing only wallpaper, or screenshot is genuinely uninterpretable"