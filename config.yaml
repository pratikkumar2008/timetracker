# Time Tracker Configuration

# Capture settings
capture:
  interval_seconds: 60
  screenshot_dir: "../data/screenshots"
  image_format: "png"
  # Resize before sending to model — full retina res is overkill and slow
  max_width: 1280

# Model settings
model:
  name: "gemma3:27b"  # Update if your ollama tag differs — check `ollama list`
  ollama_host: "http://localhost:11434"
  timeout_seconds: 60

# Storage
storage:
  log_csv: "../data/log.csv"
  reports_dir: "../data/reports"

# Taxonomy — 12 fixed categories
# Model MUST classify each screenshot into exactly one of these
categories:
  - id: "InterviewPrep-DSA"
    description: "Blind 75, LeetCode, Java practice, Educative.io DSA content"
  - id: "InterviewPrep-ML"
    description: "ML concept review — decision trees, boosting, gradient methods, ML system design"
  - id: "InterviewPrep-SystemDesign"
    description: "Generic distributed systems / system design study"
  - id: "JobHunt"
    description: "Instahyre, LinkedIn job search/applications, Wellfound, Cutshort, recruiter messages, application tracking"
  - id: "Learning"
    description: "Research papers, AI news, technical docs, Karpathy-style educational YouTube, technical blog posts"
  - id: "Communication"
    description: "Email, Slack, professional messaging not tied to job hunt"
  - id: "Personal"
    description: "Ranchi property analysis, family finances, personal admin, non-leisure personal tasks"
  - id: "Doomscroll"
    description: "Twitter/X feed, Reddit browsing, LinkedIn feed, news scrolling — passive consumption"
  - id: "Rest"
    description: "Music apps, lunch, meditation, intentional downtime — minimal screen activity"
  - id: "Entertainment"
    description: "Non-educational YouTube, Netflix, gaming, deliberately chosen leisure content"
  - id: "Social"
    description: "WhatsApp, personal chats, family communication, personal calls"
  - id: "Idle"
    description: "Screenshot is genuinely uninterpretable, locked screen, blank desktop, or activity cannot be determined"
